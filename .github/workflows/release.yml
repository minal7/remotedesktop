name: Release

# Builds the Windows host installer and the signed, notarized macOS host
# app package, then attaches both to one GitHub Release.
#
# Trigger by pushing a version tag:
#   git tag v0.2.0 && git push origin v0.2.0
# or rerun that exact tagged commit manually from the Actions tab.
#
# Required repository secrets:
#   REMOTE_DESKTOP_CLOUDKIT_API_TOKEN       - CloudKit Web Services API token
#   MACOS_CERTIFICATE_P12                   - Base64-encoded Developer ID Application .p12
#   MACOS_CERTIFICATE_PASSWORD              - Password for MACOS_CERTIFICATE_P12
#   MACOS_PROVISIONING_PROFILE_BASE64       - Base64-encoded macOS provisioning profile
#   MACOS_PROVISIONING_PROFILE_SPECIFIER    - Provisioning profile name/specifier
#   APPLE_ID                                - Apple ID used for notarization
#   APPLE_APP_SPECIFIC_PASSWORD             - App-specific password for APPLE_ID
#   APPLE_TEAM_ID                           - Apple Developer Team ID
# Optional repository variables:
#   CLOUDKIT_ENV              - "production" (default) or "development"
#   MACOS_CODE_SIGN_IDENTITY  - Defaults to "Developer ID Application"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v), e.g. 0.2.0"
        required: true
        default: "0.2.0"

permissions:
  contents: read

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_sha: ${{ steps.version.outputs.release_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        working-directory: host-windows
        env:
          REQUESTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: |
          set -euo pipefail

          # Cargo.toml is the source of truth for the release version.
          cargo="$(sed -nE 's/^version = "([^"]+)".*/\1/p' Cargo.toml | head -n 1)"
          if [[ -z "$cargo" ]]; then
            echo "::error::Could not read version from host-windows/Cargo.toml"
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/v}"
            if [[ "$tag" != "$cargo" ]]; then
              echo "::error::Tag v$tag does not match Cargo.toml version $cargo. Bump host-windows/Cargo.toml and commit Cargo.lock before tagging."
              exit 1
            fi
          elif [[ -n "$REQUESTED_VERSION" && "$REQUESTED_VERSION" != "$cargo" ]]; then
            echo "::error::Requested version $REQUESTED_VERSION does not match Cargo.toml version $cargo."
            exit 1
          fi

          expected_tag="v$cargo"
          release_sha="$(git rev-parse HEAD)"
          tag_sha="$(git rev-list -n 1 "$expected_tag" 2>/dev/null || true)"
          if [[ -z "$tag_sha" ]]; then
            echo "::error::$expected_tag must already exist. Push the version tag before publishing or manually rerunning a release."
            exit 1
          fi
          if [[ "$tag_sha" != "$release_sha" ]]; then
            echo "::error::$expected_tag points to $tag_sha, but this run checked out $release_sha. Dispatch the workflow from the tagged commit."
            exit 1
          fi

          echo "version=$cargo" >> "$GITHUB_OUTPUT"
          echo "tag_name=$expected_tag" >> "$GITHUB_OUTPUT"
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "Building version $cargo from tagged commit $release_sha"

  validate-windows:
    runs-on: windows-latest
    needs: resolve-version
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo validation build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: host-windows

      - name: Check Rust formatting
        working-directory: host-windows
        run: cargo fmt --all -- --check

      - name: Run Windows host tests
        working-directory: host-windows
        run: cargo test --locked --all-targets

  validate-computer-use:
    runs-on: macos-15
    needs: resolve-version
    env:
      # macos-15 still defaults /Applications/Xcode.app to Xcode 16.4,
      # which cannot import FoundationModels. Pin the same Xcode 26 SDK used
      # for the shipped planner path so CI cannot silently compile it out.
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer
      XCODEGEN_SHA256: 0c90f4d28ca57335f9fa78cf5bf6dabfe20a232036dabe36de2eef79cb7c0878
      XCODEGEN_VERSION: 2.45.3

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate Xcode 26 toolchain
        run: |
          set -euo pipefail

          test "$(xcodebuild -version | head -n 1)" = "Xcode 26.2"
          test "$(xcrun --sdk macosx --show-sdk-version)" = "26.2"
          test "$(xcrun --sdk iphonesimulator --show-sdk-version)" = "26.2"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install pinned XcodeGen
        run: |
          set -euo pipefail

          archive="$RUNNER_TEMP/xcodegen.zip"
          install_root="$RUNNER_TEMP/xcodegen-install"
          curl --fail --location --retry 3 --output "$archive" \
            "https://github.com/yonaskolb/XcodeGen/releases/download/$XCODEGEN_VERSION/xcodegen.zip"
          echo "$XCODEGEN_SHA256  $archive" | shasum -a 256 --check
          mkdir -p "$install_root"
          unzip -q "$archive" -d "$install_root"
          echo "$install_root/xcodegen/bin" >> "$GITHUB_PATH"
          "$install_root/xcodegen/bin/xcodegen" --version

      - name: Regenerate iOS project
        working-directory: ios
        run: xcodegen generate

      - name: Validate paired Apple CloudKit configurations
        run: |
          set -euo pipefail

          ./script/verify_apple_configuration_pair.sh Debug Debug
          ./script/verify_apple_configuration_pair.sh Release Release

      - name: Run deterministic Computer Use harness tests
        run: python3 -m unittest discover -s host-mac/scripts/tests -p 'test_*.py'

      - name: Select an available iPhone simulator
        id: simulator
        run: |
          set -euo pipefail

          simulator_udid="$(python3 - <<'PY'
          import json
          import re
          import subprocess

          data = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "--json"],
              text=True,
          ))
          candidates = []
          for runtime, devices in data.get("devices", {}).items():
              if ".iOS-" not in runtime:
                  continue
              version = tuple(int(part) for part in re.findall(r"\d+", runtime))
              for device in devices:
                  if device.get("isAvailable") and device.get("name", "").startswith("iPhone"):
                      candidates.append((version, device["name"], device["udid"]))
          if not candidates:
              raise SystemExit("No available iPhone Simulator was found")
          print(max(candidates)[2])
          PY
          )"
          echo "udid=$simulator_udid" >> "$GITHUB_OUTPUT"

      - name: Run Debug iOS diagnostic unit tests
        run: |
          set -euo pipefail

          xcodebuild test \
            -project ios/RemoteDesktop.xcodeproj \
            -scheme RemoteDesktop \
            -configuration Debug \
            -destination 'platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}' \
            -derivedDataPath "$RUNNER_TEMP/ios-derived-data" \
            -disableAutomaticPackageResolution \
            -onlyUsePackageVersionsFromResolvedFile \
            -quiet

          # The live CloudKit/TCC and installed actual-model acceptances require
          # a prepared physical Mac and are intentionally not claimed by this CI job.

  build-windows:
    runs-on: windows-latest
    needs:
      - resolve-version
      - validate-windows
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: host-windows

      - name: Build release
        working-directory: host-windows
        env:
          REMOTE_DESKTOP_CLOUDKIT_API_TOKEN: ${{ secrets.REMOTE_DESKTOP_CLOUDKIT_API_TOKEN }}
          REMOTE_DESKTOP_CLOUDKIT_ENV: ${{ vars.CLOUDKIT_ENV || 'production' }}
        run: cargo build --release --locked

      - name: Verify executable
        working-directory: host-windows
        run: |
          $exe = "target/release/remote-desktop-host.exe"
          if (-not (Test-Path $exe)) { throw "Build did not produce $exe" }
          Get-Item $exe | Select-Object Name, Length, VersionInfo

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        working-directory: host-windows/packaging
        run: |
          $v = "${{ needs.resolve-version.outputs.version }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$v" installer.iss

      - name: List artifacts
        working-directory: host-windows
        run: Get-ChildItem dist

      - name: Upload Windows installer
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-installer
          path: host-windows/dist/RemoteDesktopHost-Setup-${{ needs.resolve-version.outputs.version }}.exe
          if-no-files-found: error

  build-mac:
    runs-on: macos-15
    needs:
      - resolve-version
      - validate-computer-use
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer
      VERSION: ${{ needs.resolve-version.outputs.version }}
      MACOS_CODE_SIGN_IDENTITY: ${{ vars.MACOS_CODE_SIGN_IDENTITY || 'Developer ID Application' }}
      XCODEGEN_SHA256: 0c90f4d28ca57335f9fa78cf5bf6dabfe20a232036dabe36de2eef79cb7c0878
      XCODEGEN_VERSION: 2.45.3

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate Xcode 26 toolchain
        run: |
          set -euo pipefail

          test "$(xcodebuild -version | head -n 1)" = "Xcode 26.2"
          test "$(xcrun --sdk macosx --show-sdk-version)" = "26.2"

      - name: Install pinned XcodeGen
        run: |
          set -euo pipefail

          archive="$RUNNER_TEMP/xcodegen.zip"
          install_root="$RUNNER_TEMP/xcodegen-install"
          curl --fail --location --retry 3 --output "$archive" \
            "https://github.com/yonaskolb/XcodeGen/releases/download/$XCODEGEN_VERSION/xcodegen.zip"
          echo "$XCODEGEN_SHA256  $archive" | shasum -a 256 --check
          mkdir -p "$install_root"
          unzip -q "$archive" -d "$install_root"
          echo "$install_root/xcodegen/bin" >> "$GITHUB_PATH"
          "$install_root/xcodegen/bin/xcodegen" --version

      - name: Validate generated macOS project is current
        run: |
          set -euo pipefail

          (cd host-mac && xcodegen generate)
          if ! git diff --exit-code -- host-mac/RemoteDesktopHost.xcodeproj/project.pbxproj; then
            echo "::error::host-mac/project.yml and the checked-in Xcode project differ. Regenerate the project with XcodeGen $XCODEGEN_VERSION and commit it."
            exit 1
          fi

      - name: Validate macOS signing inputs
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
          MACOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.MACOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          set -euo pipefail

          missing=0
          for name in \
            APPLE_APP_SPECIFIC_PASSWORD \
            APPLE_ID \
            APPLE_TEAM_ID \
            MACOS_CERTIFICATE_P12 \
            MACOS_CERTIFICATE_PASSWORD \
            MACOS_PROVISIONING_PROFILE_BASE64 \
            MACOS_PROVISIONING_PROFILE_SPECIFIER
          do
            if [[ -z "${!name}" ]]; then
              echo "::error::Missing required repository secret: $name"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Install signing assets
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(uuidgen)"
          certificate_path="$RUNNER_TEMP/macos-certificate.p12"
          profile_dir="$HOME/Library/MobileDevice/Provisioning Profiles"
          profile_path="$profile_dir/RemoteDesktopHost.provisionprofile"

          printf '%s' "$MACOS_CERTIFICATE_P12" | base64 -D > "$certificate_path"
          mkdir -p "$profile_dir"
          printf '%s' "$MACOS_PROVISIONING_PROFILE_BASE64" | base64 -D > "$profile_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12
          security list-keychains -d user -s "$keychain_path" "$HOME/Library/Keychains/login.keychain-db"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

      - name: Run Debug macOS diagnostic Computer Use tests
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          # These deterministic tests do not use CloudKit. Omitting the app's
          # CloudKit entitlements lets the test host use the imported Developer
          # ID identity without applying the production app profile to its
          # nested XCTest bundle. The archive below separately proves every
          # production entitlement and signature.
          xcodebuild test \
            -project host-mac/RemoteDesktopHost.xcodeproj \
            -scheme RemoteDesktopHost \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/host-tests-derived-data" \
            -disableAutomaticPackageResolution \
            -onlyUsePackageVersionsFromResolvedFile \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$MACOS_CODE_SIGN_IDENTITY" \
            CODE_SIGN_ENTITLEMENTS="" \
            -quiet

          # Actual-model, live desktop, TCC, and production CloudKit checks are
          # separate prepared-machine acceptance gates, not GitHub-hosted CI.

      - name: Build signed archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MACOS_PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.MACOS_PROVISIONING_PROFILE_SPECIFIER }}
        run: |
          set -euo pipefail

          archive_path="$PWD/host-mac/build/RemoteDesktopHost.xcarchive"
          rm -rf "$archive_path" "$PWD/host-mac/dist"
          mkdir -p "$PWD/host-mac/dist"

          xcodebuild archive \
            -project host-mac/RemoteDesktopHost.xcodeproj \
            -scheme RemoteDesktopHost \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$archive_path" \
            -disableAutomaticPackageResolution \
            -onlyUsePackageVersionsFromResolvedFile \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$MACOS_CODE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$MACOS_PROVISIONING_PROFILE_SPECIFIER" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            archive

          app_path="$archive_path/Products/Applications/RemoteDesktopHost.app"
          if [[ ! -d "$app_path" ]]; then
            echo "::error::Build did not produce $app_path"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"

      - name: Validate macOS distribution signature
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          app_path="$PWD/host-mac/build/RemoteDesktopHost.xcarchive/Products/Applications/RemoteDesktopHost.app"
          entitlements_path="$RUNNER_TEMP/RemoteDesktopHost-entitlements.plist"
          signature_details="$(codesign -dvvv "$app_path" 2>&1)"

          if [[ "$signature_details" != *"Authority=Developer ID Application:"* ]]; then
            echo "::error::The macOS archive is not signed with Developer ID Application."
            exit 1
          fi
          if [[ "$signature_details" != *"TeamIdentifier=$APPLE_TEAM_ID"* ]]; then
            echo "::error::The macOS archive is signed by the wrong team."
            exit 1
          fi
          if [[ "$signature_details" != *"flags=0x10000(runtime)"* ]]; then
            echo "::error::The macOS archive is missing the hardened runtime."
            exit 1
          fi

          codesign -d --entitlements :- "$app_path" > "$entitlements_path" 2>/dev/null
          read_entitlement() {
            /usr/libexec/PlistBuddy -c "Print :$1" "$entitlements_path" 2>/dev/null || true
          }

          if [[ -n "$(read_entitlement com.apple.security.get-task-allow)" ]]; then
            echo "::error::The distribution archive must not contain get-task-allow."
            exit 1
          fi
          if [[ -n "$(read_entitlement com.apple.developer.aps-environment)" ]]; then
            echo "::error::The polling-only host must not contain an unused APS entitlement."
            exit 1
          fi
          if [[ "$(read_entitlement com.apple.security.automation.apple-events)" != "true" ]]; then
            echo "::error::The distribution archive is missing the Apple Events automation entitlement required by approved Mail actions."
            exit 1
          fi
          if [[ "$(read_entitlement com.apple.security.device.audio-input)" != "true" ]]; then
            echo "::error::The distribution archive is missing the audio-input entitlement required by the host audio bridge."
            exit 1
          fi
          if [[ "$(read_entitlement com.apple.developer.icloud-container-environment)" != "Production" ]]; then
            echo "::error::The distribution archive must use the Production CloudKit environment."
            exit 1
          fi
          if [[ "$(read_entitlement com.apple.developer.icloud-services:0)" != "CloudKit" ]]; then
            echo "::error::The distribution archive is missing the CloudKit service entitlement."
            exit 1
          fi
          if [[ "$(read_entitlement com.apple.developer.icloud-container-identifiers:0)" != "iCloud.com.threadmark.remotedesktop" ]]; then
            echo "::error::The distribution archive uses the wrong CloudKit container."
            exit 1
          fi

          while IFS= read -r -d '' nested_code; do
            if [[ "$(file -b "$nested_code")" != *"Mach-O"* ]]; then
              continue
            fi
            codesign --verify --strict --verbose=2 "$nested_code"
            nested_details="$(codesign -dvvv "$nested_code" 2>&1)"
            if [[ "$nested_details" != *"Authority=Developer ID Application:"* ]] || \
               [[ "$nested_details" != *"TeamIdentifier=$APPLE_TEAM_ID"* ]]; then
              echo "::error::Nested code is not signed by the expected Developer ID team: $nested_code"
              exit 1
            fi
            if [[ "$nested_details" != *"flags=0x10000(runtime)"* ]]; then
              echo "::error::Nested Mach-O code is missing the hardened runtime: $nested_code"
              exit 1
            fi
            if [[ "$nested_details" != *"Timestamp="* ]]; then
              echo "::error::Nested code is missing a secure timestamp: $nested_code"
              exit 1
            fi
          done < <(find "$app_path/Contents" -type f -print0)

      - name: Notarize and staple app
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          app_path="$PWD/host-mac/build/RemoteDesktopHost.xcarchive/Products/Applications/RemoteDesktopHost.app"
          notary_zip="$RUNNER_TEMP/RemoteDesktopHost-notary.zip"

          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$app_path" "$notary_zip"
          xcrun notarytool submit "$notary_zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$app_path"
          xcrun stapler validate "$app_path"
          spctl --assess --type execute --verbose=4 "$app_path"

      - name: Package macOS app
        run: |
          set -euo pipefail

          app_path="$PWD/host-mac/build/RemoteDesktopHost.xcarchive/Products/Applications/RemoteDesktopHost.app"
          package_path="$PWD/host-mac/dist/RemoteDesktopHost-macOS-$VERSION.zip"

          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$app_path" "$package_path"
          ls -lh "$package_path"

      - name: Upload macOS app package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-app
          path: host-mac/dist/RemoteDesktopHost-macOS-${{ needs.resolve-version.outputs.version }}.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - resolve-version
      - validate-windows
      - validate-computer-use
      - build-windows
      - build-mac

    steps:
      - name: Checkout tagged release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.resolve-version.outputs.release_sha }}
          fetch-depth: 0

      - name: Verify release tag still identifies the built commit
        env:
          RELEASE_SHA: ${{ needs.resolve-version.outputs.release_sha }}
          RELEASE_TAG: ${{ needs.resolve-version.outputs.tag_name }}
        run: |
          set -euo pipefail
          tag_sha="$(git rev-list -n 1 "$RELEASE_TAG" 2>/dev/null || true)"
          if [[ "$tag_sha" != "$RELEASE_SHA" ]]; then
            echo "::error::$RELEASE_TAG no longer identifies built commit $RELEASE_SHA."
            exit 1
          fi

      - name: Download release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag_name }}
          target_commitish: ${{ needs.resolve-version.outputs.release_sha }}
          name: Remote Desktop Host ${{ needs.resolve-version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: false
          files: release-assets/*

      - name: Checkout default branch for README update
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Update README download links
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-version.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
          TESTFLIGHT_URL: https://testflight.apple.com/join/tyHPrUny
        run: node .github/scripts/update-readme-downloads.mjs

      - name: Commit README download links
        run: |
          set -euo pipefail

          if git diff --quiet README.md; then
            echo "README download links are already current."
            exit 0
