name: RemoteDesktop
options:
  bundleIdPrefix: com.threadmark.remotedesktop
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "5.10"
  ENABLE_USER_SCRIPT_SANDBOXING: YES
  SWIFT_STRICT_CONCURRENCY: targeted

packages:
  LiveKitWebRTC:
    url: https://github.com/livekit/webrtc-xcframework.git
    exactVersion: 144.7559.3

targets:
  RemoteDesktop:
    type: application
    platform: iOS
    sources:
      - path: RemoteDesktop
      - path: RemoteDesktop/Transport/WebRTCAliases.swift
      - path: ../protocol/Swift
    dependencies:
      - package: LiveKitWebRTC
        product: LiveKitWebRTC
    entitlements:
      path: RemoteDesktop/RemoteDesktop.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.threadmark.remotedesktop
        com.apple.developer.icloud-container-environment: $(ICLOUD_CONTAINER_ENVIRONMENT)
        com.apple.developer.icloud-services:
          - CloudKit
    info:
      path: RemoteDesktop/Info.plist
      properties:
        CFBundleDisplayName: Remote Desktop
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        NSLocalNetworkUsageDescription: >
          Remote Desktop uses your local network for faster, direct connections
          to your computer when both devices are on the same Wi-Fi.
        NSMicrophoneUsageDescription: >
          Remote Desktop includes a microphone-capable WebRTC component, but
          this app only plays audio from your Mac and never records, stores, or
          transmits audio from your microphone.
        NSCameraUsageDescription: >
          Remote Desktop includes a camera-capable WebRTC component, but this
          app never captures, stores, or transmits video from your camera.
        NSBonjourServices:
          - _remotedesktop._tcp
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: V9AX39SPJD
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "5"
        PRODUCT_BUNDLE_IDENTIFIER: com.threadmark.remotedesktop.client
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIStatusBarHidden: NO
        # Debug uses the Development database on both devices and Simulator.
        # Release uses Production so a Release iOS client can find the
        # officially distributed macOS host.
        ICLOUD_CONTAINER_ENVIRONMENT: Development
      configs:
        Release:
          ICLOUD_CONTAINER_ENVIRONMENT: Production

  RemoteDesktopTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RemoteDesktopTests
    dependencies:
      - target: RemoteDesktop
    settings:
      DEVELOPMENT_TEAM: V9AX39SPJD
      PRODUCT_BUNDLE_IDENTIFIER: com.threadmark.remotedesktop.client.tests
      GENERATE_INFOPLIST_FILE: YES

  RemoteDesktopLiveE2ETests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RemoteDesktopLiveE2ETests
    dependencies:
      - target: RemoteDesktop
    settings:
      DEVELOPMENT_TEAM: V9AX39SPJD
      PRODUCT_BUNDLE_IDENTIFIER: com.threadmark.remotedesktop.client.live-e2e-tests
      GENERATE_INFOPLIST_FILE: YES

schemes:
  RemoteDesktop:
    build:
      targets:
        RemoteDesktop: all
        RemoteDesktopTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - RemoteDesktopTests

  RemoteDesktopLiveE2E:
    build:
      targets:
        RemoteDesktop: all
        RemoteDesktopLiveE2ETests: [test]
    test:
      # Live UI acceptance connects through the Production CloudKit database
      # to the officially distributed host. Keep this aligned with the
      # Release app configuration used by the person running the test.
      config: Release
      targets:
        - RemoteDesktopLiveE2ETests
      environmentVariables:
        RUN_COMPUTER_USE_LIVE_E2E: "1"
        RUN_COMPUTER_USE_TYPED_OUTCOME_SIMULATOR_E2E: "$(RUN_COMPUTER_USE_TYPED_OUTCOME_SIMULATOR_E2E)"
        # DoorDash/OS-Atlas is independently gated. Values are command-line
        # build settings expanded into the test process only for an explicit
        # run; an ordinary LiveE2E invocation sees empty values and skips it.
        RUN_COMPUTER_USE_LOCAL_LIFECYCLE_SIMULATOR_E2E: "$(RUN_COMPUTER_USE_LOCAL_LIFECYCLE_SIMULATOR_E2E)"
        RUN_OSATLAS_LOCAL_FIXTURE_SIMULATOR_E2E: "$(RUN_OSATLAS_LOCAL_FIXTURE_SIMULATOR_E2E)"
        RUN_OSATLAS_DOORDASH_SIMULATOR_E2E: "$(RUN_OSATLAS_DOORDASH_SIMULATOR_E2E)"
        RUN_OSATLAS_DOORDASH_GUEST_HANDOFF_SIMULATOR_E2E: "$(RUN_OSATLAS_DOORDASH_GUEST_HANDOFF_SIMULATOR_E2E)"
        RUN_OSATLAS_DOORDASH_TAKEOVER_RESUME_SIMULATOR_E2E: "$(RUN_OSATLAS_DOORDASH_TAKEOVER_RESUME_SIMULATOR_E2E)"
        OSATLAS_DOORDASH_EXPECTED_RESTAURANT: "$(OSATLAS_DOORDASH_EXPECTED_RESTAURANT)"
        OSATLAS_DOORDASH_EXPECTED_ITEM: "$(OSATLAS_DOORDASH_EXPECTED_ITEM)"
        OSATLAS_DOORDASH_EXPECTED_SUBTOTAL: "$(OSATLAS_DOORDASH_EXPECTED_SUBTOTAL)"
        OSATLAS_DOORDASH_EXPECTED_DELIVERY_FEE: "$(OSATLAS_DOORDASH_EXPECTED_DELIVERY_FEE)"
        OSATLAS_DOORDASH_EXPECTED_SERVICE_FEE: "$(OSATLAS_DOORDASH_EXPECTED_SERVICE_FEE)"
        OSATLAS_DOORDASH_EXPECTED_TAX: "$(OSATLAS_DOORDASH_EXPECTED_TAX)"
        OSATLAS_DOORDASH_EXPECTED_TOTAL: "$(OSATLAS_DOORDASH_EXPECTED_TOTAL)"
        OSATLAS_DOORDASH_EXPECTED_ETA: "$(OSATLAS_DOORDASH_EXPECTED_ETA)"
