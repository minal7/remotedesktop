name: RemoteDesktopHost
options:
  bundleIdPrefix: com.threadmark.remotedesktop
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "5.10"
  SWIFT_STRICT_CONCURRENCY: targeted
  ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  LiveKitWebRTC:
    url: https://github.com/livekit/webrtc-xcframework.git
    exactVersion: 144.7559.3
  MCP:
    url: https://github.com/modelcontextprotocol/swift-sdk.git
    exactVersion: 0.12.1
  SwiftSystem:
    url: https://github.com/apple/swift-system.git
    exactVersion: 1.7.4

schemes:
  RemoteDesktopHost:
    build:
      targets:
        RemoteDesktopHost: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - RemoteDesktopHostTests
      # This is an app-hosted unit-test bundle, not a UI-test target. Leaving
      # Xcode's automatic capture enabled makes XCTest start a screen recording
      # in the Debug host process and can surface a misleading macOS TCC alert.
      captureScreenshotsAutomatically: false
      # Keep the non-recording format explicit as a second boundary if Xcode
      # ever ignores the attachment lifetime for this app-hosted unit bundle.
      preferredScreenCaptureFormat: screenshots
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  RemoteDesktopHost:
    type: application
    platform: macOS
    sources:
      - path: RemoteDesktopHost
      - path: RemoteDesktopHost/WebRTCAliases.swift
      - path: ../protocol/Swift
    dependencies:
      - package: LiveKitWebRTC
        product: LiveKitWebRTC
      - package: MCP
        product: MCP
      - package: SwiftSystem
        product: SystemPackage
    postBuildScripts:
      - path: scripts/package_llama_runtime.sh
        name: Package and Sign Pinned llama.cpp Runtime
        shell: /bin/bash
        showEnvVars: false
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(SRCROOT)/scripts/package_llama_runtime.sh
          - $(SRCROOT)/scripts/verify_llama_runtime.py
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/runtime-manifest.json
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/llama-server
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libggml-base.0.16.0.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libggml-base.0.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libggml-blas.0.16.0.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libggml-blas.0.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libggml-cpu.0.16.0.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libggml-cpu.0.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libggml-metal.0.16.0.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libggml-metal.0.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libggml-rpc.0.16.0.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libggml-rpc.0.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libggml.0.16.0.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libggml.0.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libllama-common.0.0.9992.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libllama-common.0.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libllama-server-impl.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libllama.0.0.9992.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libllama.0.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libmtmd.0.0.9992.dylib
          - $(SRCROOT)/ThirdPartyRuntime/llama-b9992/libmtmd.0.dylib
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/ComputerUseRuntime/llama-b9992
    info:
      path: RemoteDesktopHost/Info.plist
      properties:
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        CFBundleDisplayName: Remote Desktop Host
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSAudioCaptureUsageDescription: "Remote Desktop Host captures your Mac's system audio so sound playing on the host can be heard on your client device."
        NSMicrophoneUsageDescription: "Remote Desktop Host uses the microphone permission because the host audio pipeline relies on the system audio engine's recording path to forward your Mac's sound to your client device. The app does not transmit microphone audio."
        NSAppleEventsUsageDescription: "Remote Desktop Host uses Apple events only after your approval to open an email draft or send the exact email shown on your mobile device."
        NSHumanReadableCopyright: "Copyright © 2026"
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
    # Sandbox is intentionally OFF: Accessibility-based CGEvent
    # injection is incompatible with the App Sandbox. This host
    # ships as a signed, notarized user-installed agent (not App
    # Store) — same model as every other remote-control tool.
    entitlements:
      path: RemoteDesktopHost/RemoteDesktopHost.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.threadmark.remotedesktop
        # Directly-distributed (Developer ID, non-App-Store) builds pick
        # their CloudKit environment from this entitlement. Without it the
        # app defaults to Development, which is invisible to the App
        # Store/TestFlight iOS client (always Production). The value is
        # supplied per build configuration (see ICLOUD_CONTAINER_ENVIRONMENT
        # below): Debug = Development (pairs with an Xcode-run iOS client),
        # Release = Production (pairs with the TestFlight/App Store client).
        com.apple.developer.icloud-container-environment: $(ICLOUD_CONTAINER_ENVIRONMENT)
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.security.automation.apple-events: true
        com.apple.security.device.audio-input: true
    settings:
      base:
        CODE_SIGN_IDENTITY: Apple Development
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: V9AX39SPJD
        # The verified runtime phase copies and signs a directory tree. Xcode's
        # user-script sandbox cannot express ditto's atomic temporary files in
        # that tree, so it must be disabled for this build-only phase. This is
        # unrelated to the app sandbox, hardened runtime, or runtime security.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.threadmark.remotedesktop.host
        MARKETING_VERSION: 0.2.1
        CURRENT_PROJECT_VERSION: 2
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
      configs:
        Debug:
          ICLOUD_CONTAINER_ENVIRONMENT: Development
        Release:
          ICLOUD_CONTAINER_ENVIRONMENT: Production

  RemoteDesktopHostTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: RemoteDesktopHostTests
    dependencies:
      - target: RemoteDesktopHost
    settings:
      CODE_SIGN_IDENTITY: Apple Development
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: V9AX39SPJD
      PRODUCT_BUNDLE_IDENTIFIER: com.threadmark.remotedesktop.host.tests
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      GENERATE_INFOPLIST_FILE: YES
